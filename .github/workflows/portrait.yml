name: ReelForge Portrait

on:
  workflow_dispatch:
    inputs:
      avatar_id:
        required: true
        type: string
      avatar_name:
        required: false
        type: string
        default: 'Avatar'
      portrait_prefs:
        required: false
        type: string
        default: '{}'

jobs:
  portrait:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install kaggle supabase boto3 requests

      - name: Run Portrait Generation on Kaggle
        env:
          AVATAR_ID:           ${{ inputs.avatar_id }}
          AVATAR_NAME:         ${{ inputs.avatar_name }}
          PORTRAIT_PREFS:      ${{ inputs.portrait_prefs }}
          KAGGLE_POOL:         ${{ secrets.KAGGLE_POOL }}
          SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID:       ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:    ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:      ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:       ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/stage0.js

      - name: On Failure
        if: failure()
        env:
          AVATAR_ID:    ${{ inputs.avatar_id }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -X PATCH "$SUPABASE_URL/rest/v1/avatars?id=eq.$AVATAR_ID" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"status":"failed"}'
