name: ReelForge Pipeline

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      prompt:
        required: true
        type: string
      portrait_needed:
        required: true
        type: string
      portrait_prefs:
        required: false
        type: string
        default: '{}'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install kaggle supabase boto3 requests

      - name: Install Node deps
        run: npm ci

      - name: Stage 0 - Portrait Generation
        if: ${{ inputs.portrait_needed == 'true' }}
        env:
          JOB_ID: ${{ inputs.job_id }}
          PORTRAIT_PREFS: ${{ inputs.portrait_prefs }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          KAGGLE_POOL: ${{ secrets.KAGGLE_POOL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node scripts/stage0.js

      - name: Stage 1 - Classify and Script
        id: classify
        env:
          JOB_ID: ${{ inputs.job_id }}
          PROMPT: ${{ inputs.prompt }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/stage1.js

      - name: Stage 2A - Voiceover (Spokesperson)
        if: ${{ steps.classify.outputs.pipeline_mode == 'spokesperson' }}
        env:
          JOB_ID: ${{ inputs.job_id }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          sudo apt-get install -y espeak-ng
          pip install kokoro soundfile numpy boto3
          python scripts/stage2a.py

      - name: Stage 3A - EchoMimic on Kaggle (Spokesperson)
        if: ${{ steps.classify.outputs.pipeline_mode == 'spokesperson' }}
        env:
          JOB_ID: ${{ inputs.job_id }}
          KAGGLE_POOL: ${{ secrets.KAGGLE_POOL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/stage3a.js

      - name: Stage 2B - Wan2.1 on Kaggle (Scene)
        if: ${{ steps.classify.outputs.pipeline_mode == 'scene' }}
        env:
          JOB_ID: ${{ inputs.job_id }}
          KAGGLE_POOL: ${{ secrets.KAGGLE_POOL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/stage2b.js

      - name: Stage 3B - Stitch Clips (Scene)
        if: ${{ steps.classify.outputs.pipeline_mode == 'scene' }}
        env:
          JOB_ID: ${{ inputs.job_id }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/stage3b.js

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Stage 4 - Final Encode
        env:
          JOB_ID: ${{ inputs.job_id }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/stage4.js

      - name: On Failure
        if: failure()
        env:
          JOB_ID: ${{ inputs.job_id }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.$JOB_ID" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"status":"failed","error":"Pipeline failed - check Actions logs"}'
