name: POC Screen Recording Test

on:
  workflow_dispatch:

jobs:
  test-recording:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check ffmpeg availability
        run: ffmpeg -version

      - name: Run screen recording POC
        run: node poc_screen_recording.js

      - name: Check recording file
        run: ls -la /tmp/poc_recording.webm

      - name: Upload recording as artifact
        uses: actions/upload-artifact@v4
        with:
          name: poc-recording
          path: /tmp/poc_recording.webm
          retention-days: 1
